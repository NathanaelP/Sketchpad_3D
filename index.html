<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sketch3D</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />

  <!-- es-module-shims must come before importmap for Safari compatibility -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Hammer.js as regular script (not an ES module) -->
  <script src="https://unpkg.com/hammerjs@2.0.8/hammer.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span class="app-name">Sketch3D</span>
      <div class="toolbar-center">
        <span id="active-tool-label">Line</span>
        <div class="tool-group">
          <button class="tool-btn" data-tool="orbit" title="Orbit / pan camera">Orbit</button>
          <button class="tool-btn" data-tool="select">Select</button>
          <button class="tool-btn active" data-tool="line">Line</button>
          <button class="tool-btn" data-tool="freehand">Free</button>
          <button class="tool-btn" data-tool="erase">Erase</button>
        </div>
      </div>
      <div class="toolbar-right">
        <button id="snap-btn" class="snap-btn active" title="Toggle snapping">&#x1F9F2;</button>
        <button id="undo-btn" title="Undo (Ctrl+Z)">&#x21A9;</button>
        <button id="menu-btn" title="Toggle panel">&#9776;</button>
      </div>
    </div>

    <div id="side-panel">
      <div id="panel-header">Planes</div>
      <div id="line-width-row">
        <label for="line-width-slider" class="lw-label">Stroke</label>
        <input type="range" id="line-width-slider" min="1" max="12" step="1" value="3" />
        <span id="line-width-value">3px</span>
      </div>
      <div id="plane-list"></div>
      <div id="panel-footer">
        <button id="add-plane-btn">+ Add Plane</button>
        <div id="orientation-picker">
          <button class="orient-btn" data-orient="front">Front</button>
          <button class="orient-btn" data-orient="top">Top</button>
          <button class="orient-btn" data-orient="right">Right</button>
        </div>
        <div id="file-btns">
          <button class="file-btn" id="export-json-btn">Export</button>
          <button class="file-btn" id="import-json-btn">Import</button>
          <button class="file-btn" id="export-svg-btn">SVG</button>
        </div>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
      </div>
    </div>
    <div id="panel-tab" title="Toggle panel">&#9664;</div>

    <div id="coord-bar">
      <div class="coord-row" id="coord-row-start">
        <span class="coord-row-label">Start</span>
        <span class="coord-label">X</span>
        <input type="number" id="coord-start-x" class="coord-input" step="0.25" />
        <span class="coord-label">Y</span>
        <input type="number" id="coord-start-y" class="coord-input" step="0.25" />
      </div>
      <div class="coord-row" id="coord-row-end">
        <span class="coord-row-label">End</span>
        <span class="coord-label">X</span>
        <input type="number" id="coord-end-x" class="coord-input" step="0.25" />
        <span class="coord-label">Y</span>
        <input type="number" id="coord-end-y" class="coord-input" step="0.25" />
      </div>
      <div class="coord-row" id="coord-row-polar">
        <span class="coord-row-label">Polar</span>
        <span class="coord-label">L</span>
        <input type="number" id="coord-length" class="coord-input" step="0.25" min="0" />
        <span class="coord-label">°</span>
        <input type="number" id="coord-polar-angle" class="coord-input coord-input-wide" step="0.5" />
      </div>
      <button id="coord-go" title="Commit line (Enter)">&#x2192;</button>
      <div class="coord-row" id="coord-row-angle">
        <span class="coord-row-label">Angle</span>
        <div id="pivot-group">
          <button class="pivot-btn active" data-pivot="start" title="Pivot: Start point">S</button>
          <button class="pivot-btn" data-pivot="center" title="Pivot: Center">C</button>
          <button class="pivot-btn" data-pivot="end" title="Pivot: End point">E</button>
        </div>
        <span class="coord-label">°</span>
        <input type="number" id="coord-angle" class="coord-input coord-input-wide" step="0.5" />
      </div>
    </div>

    <canvas id="viewport-canvas"></canvas>
    <div id="dimension-overlay"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
